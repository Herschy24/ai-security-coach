version: '3.8'

services:
  ai-security-coach:
    build: .
    # Or use image if you push to a registry:
    # image: ghcr.io/YOUR_GITHUB_USERNAME/ai-security-coach:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/lessons"]
      interval: 30s
      timeout: 10s
      retries: 3
